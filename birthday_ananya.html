<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Ananya</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffb6e6, #b3d9ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 450px;
        }
        h1 {
            color: #ff4da6;
            font-size: 2.2rem;
        }
        p {
            font-size: 1.2rem;
            color: #444;
        }
        .small {
            margin-top: 20px;
            font-size: 1rem;
            color: #777;
        }
        .heart {
            font-size: 2.5rem;
            margin: 10px 0;
        }
        img {
            width: 100%;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Happy Birthday, Ananya! 🎉</h1>
        <div class="heart">💗</div>
        <p>Wishing you a day filled with happiness, smiles, and everything you deserve.</p>
        <p>From,<br><strong>Diganth</strong></p>
        <p class="small">Hope this little website makes your day a bit more special!</p>
    </div>
</body>
</html>
